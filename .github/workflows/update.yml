name: Monthly update (ABS Labour Force release)

# Runs after the ABS publishes Labour Force, Australia (typically the
# third Thursday of each month). The cron fires daily on the 14th-22nd
# of each month at 02:30 UTC (12:30/13:30 AEST/AEDT) -- the workflow
# itself exits early if nothing material has changed since the last run.
#
# Manual triggering is always available via the "Run workflow" button.

on:
  schedule:
    - cron: "30 2 14-22 * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Re-run even if no source data changed"
        required: false
        default: "false"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: prd-update
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-${{ runner.os }}-${{ hashFiles('DESCRIPTION') }}
          restore-keys: r-pkgs-${{ runner.os }}-

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # cmdstanr lives on the Stan r-universe, not CRAN, so install it via
          # the GitHub-remote form. Everything else resolves from CRAN/RSPM.
          extra-packages: |
            stan-dev/cmdstanr
            any::posterior
            any::dplyr
            any::tidyr
            any::tibble
            any::readr
            any::readxl
            any::lubridate
            any::httr
            any::ggplot2
            any::patchwork
            any::testthat
          dependencies: '"hard"'

      - name: Cache CmdStan
        id: cache-cmdstan
        uses: actions/cache@v4
        with:
          path: ~/.cmdstan
          key: cmdstan-${{ runner.os }}-2.39.0

      - name: Install CmdStan
        if: steps.cache-cmdstan.outputs.cache-hit != 'true'
        run: |
          Rscript -e 'cmdstanr::install_cmdstan(cores = 2, version = "2.39.0")'

      - name: Fetch latest ABS data
        run: |
          Rscript -e 'source("R/abs_fetch.R"); fetch_lf_table01("data/raw"); fetch_gdp_table01("data/raw"); cat("Downloaded:\n"); print(file.info(list.files("data/raw", full.names=TRUE))[,"size",drop=FALSE])'

      - name: Run unit tests
        run: |
          Rscript -e 'testthat::test_dir("tests", stop_on_failure=TRUE)'

      - name: Fit model and write outputs
        env:
          PRD_CHAINS: "4"
          PRD_WARMUP: "1000"
          PRD_SAMPLING: "1000"
        run: |
          Rscript R/run.R

      - name: Detect whether estimates changed
        id: changes
        run: |
          # docs/index.html always changes (it contains the run timestamp), so
          # only treat the run as material if outputs/ changed.
          git add -N outputs
          if git diff --quiet -- outputs; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit refreshed outputs
        if: steps.changes.outputs.changed == 'true' || github.event.inputs.force == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs docs
          git commit -m "chore(data): refresh estimates ($(date -u +%Y-%m-%d)) [skip ci]" || echo "nothing to commit"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy-pages:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
